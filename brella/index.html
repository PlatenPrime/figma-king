<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brella</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Libre+Baskerville:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <a href="#" class="header__logo">Brella</a>

      <nav class="header__nav" aria-label="Main navigation">
        <ul class="header__menu">
          <li><a href="#">Our Plan</a></li>
          <li><a href="#">Employers</a></li>
          <li><a href="#">Brokers</a></li>
          <li><a href="#">Members</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Blog</a></li>
        </ul>

        <div class="header__actions">
          <a href="#" class="header__cta">Request a demo</a>

          <button type="button" class="header__login" aria-haspopup="true" aria-expanded="false">
            Login
            <svg class="header__chevron" width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true">
              <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>

          <button type="button" class="header__lang" aria-label="Select language">EN</button>
        </div>
      </nav>
    </header>
  </body>
</html>
